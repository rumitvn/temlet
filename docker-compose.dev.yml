version: '3.8'

services:
  # Database for development
  database:
    image: postgres:15-alpine
    container_name: nexrender-db-dev
    environment:
      POSTGRES_DB: nexrender_dev
      POSTGRES_USER: nexrender
      POSTGRES_PASSWORD: nexrender_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexrender"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: nexrender-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nexrender Server for development
  nexrender-server:
    image: inlife/nexrender-server:latest
    container_name: nexrender-server-dev
    environment:
      NEXRENDER_SERVER_PORT: 3000
      NEXRENDER_SERVER_SECRET: dev-secret-key
      NEXRENDER_DATABASE_URL: postgresql://nexrender:nexrender_password@database:5432/nexrender_dev
      NEXRENDER_REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./nexrender-data:/opt/nexrender/data
      - ./nexrender-assets:/opt/nexrender/assets
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Nexrender Worker 1 for development
  nexrender-worker-1:
    image: inlife/nexrender-worker:latest
    container_name: nexrender-worker-1-dev
    environment:
      NEXRENDER_WORKER_SERVER: http://nexrender-server:3000
      NEXRENDER_WORKER_SECRET: dev-secret-key
      NEXRENDER_WORKER_CONCURRENT: 1
      NEXRENDER_WORKER_LOGS: /opt/nexrender/logs
    volumes:
      - ./nexrender-data:/opt/nexrender/data
      - ./nexrender-assets:/opt/nexrender/assets
      - ./nexrender-logs:/opt/nexrender/logs
    depends_on:
      - nexrender-server
    restart: unless-stopped

  # Nexrender Worker 2 for development
  nexrender-worker-2:
    image: inlife/nexrender-worker:latest
    container_name: nexrender-worker-2-dev
    environment:
      NEXRENDER_WORKER_SERVER: http://nexrender-server:3000
      NEXRENDER_WORKER_SECRET: dev-secret-key
      NEXRENDER_WORKER_CONCURRENT: 1
      NEXRENDER_WORKER_LOGS: /opt/nexrender/logs
    volumes:
      - ./nexrender-data:/opt/nexrender/data
      - ./nexrender-assets:/opt/nexrender/assets
      - ./nexrender-logs:/opt/nexrender/logs
    depends_on:
      - nexrender-server
    restart: unless-stopped

  # Development Next.js Application with hot reloading
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexrender-manager-app-dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://nexrender:nexrender_password@database:5432/nexrender_dev
      REDIS_URL: redis://redis:6379
      NEXRENDER_SERVER_URL: http://nexrender-server:3000
      NEXRENDER_SERVER_SECRET: dev-secret-key
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - ./nexrender-data:/app/nexrender-data
      - ./nexrender-assets:/app/nexrender-assets
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      nexrender-server:
        condition: service_started
    restart: unless-stopped
    command: ["npm", "run", "dev"]

  # Development monitoring service
  monitor:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexrender-monitor-dev
    command: ["node", "scripts/monitor.js"]
    environment:
      NODE_ENV: development
      APP_URL: http://app:3001
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  default:
    name: nexrender-network-dev 